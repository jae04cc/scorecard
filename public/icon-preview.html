<!DOCTYPE html>
<html>
<head>
<title>Icon Preview</title>
<style>
  body { background: #333; display: flex; flex-wrap: wrap; gap: 32px; padding: 40px; font-family: sans-serif; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; color: #aaa; font-size: 12px; }
</style>
</head>
<body>

<!-- 512px PWA -->
<div class="item">
<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="110" fill="#0e0e18"/>
  <line x1="148" y1="148" x2="148" y2="364" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <line x1="213" y1="148" x2="213" y2="364" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <line x1="278" y1="148" x2="278" y2="364" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <line x1="343" y1="148" x2="343" y2="364" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Diagonal slash / direction, shallower angle -->
  <line x1="100" y1="360" x2="400" y2="152" stroke="white" stroke-width="28" stroke-linecap="round"/>
</svg>
<span>512px PWA</span>
</div>

</div>
