<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scorecard — Offline</title>
  <style>
    body {
      margin: 0;
      background: #000;
      color: #94a3b8;
      font-family: system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 { color: #fff; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { font-size: 0.9rem; max-width: 280px; line-height: 1.6; }
    button {
      margin-top: 1.5rem;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 0.75rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>You're offline</h1>
  <p>Scorecard needs a connection to load. Any rounds you entered have been saved and will sync when you're back online.</p>
  <button onclick="location.reload()">Try Again</button>
</body>
</html>
