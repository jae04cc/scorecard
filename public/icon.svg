  <!-- Row 3 -->
  <rect x="156" y="292" width="104" height="12" rx="6" fill="#3d3d3d"/>
  <rect x="324" y="292" width="48" height="12" rx="6" fill="#3d3d3d"/>
  <!-- Row 4 -->
  <rect x="156" y="334" width="132" height="12" rx="6" fill="#3d3d3d"/>
  <rect x="324" y="334" width="48" height="12" rx="6" fill="#3d3d3d"/>
